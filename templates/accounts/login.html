<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — {{ SCHOOL_NAME }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
    }
    .school-logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: white; margin: 0 auto 1rem;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">
  <div class="login-card">
    <div class="school-logo"><i class="bi bi-mortarboard-fill"></i></div>
    <h4 class="text-center fw-bold mb-1">{{ SCHOOL_NAME }}</h4>
    <p class="text-center text-muted mb-4 small">School Management System</p>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} py-2">
      {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Username / Registration Number</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter username"
                 value="{{ username|default:'' }}" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="passwordField" class="form-control" placeholder="Enter password" required>
          <button class="btn btn-outline-secondary" type="button" id="togglePwd">
            <i class="bi bi-eye" id="pwdIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <p class="text-center text-muted mt-4 mb-0 small">
      &copy; {{ SCHOOL_NAME }} · {{ "now"|date:"Y" }}
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('togglePwd').addEventListener('click', function() {
      const field = document.getElementById('passwordField');
      const icon = document.getElementById('pwdIcon');
      if (field.type === 'password') {
        field.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        field.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });
  </script>
</body>
</html>
