<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Portal — {{ SCHOOL_NAME }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
  <div class="text-center">
    <i class="bi bi-person-x" style="font-size:4rem;color:#fd7e14;"></i>
    <h3 class="mt-3 fw-bold">No Portal Assigned</h3>
    <p class="text-muted">
      Your account ({{ request.user.username }}) has not been assigned to a portal yet.<br>
      Please contact the system administrator.
    </p>
    <form method="post" action="{% url 'accounts:logout' %}" class="d-inline">
      {% csrf_token %}
      <button type="submit" class="btn btn-outline-secondary">Logout</button>
    </form>
  </div>
</body>
</html>
