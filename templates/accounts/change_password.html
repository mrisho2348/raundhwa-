<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password — {{ SCHOOL_NAME }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; min-height: 100vh; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">
  <div class="bg-white rounded-4 shadow p-4" style="max-width:440px;width:100%;">
    <div class="text-center mb-4">
      <i class="bi bi-key-fill fs-2 text-primary"></i>
      <h5 class="fw-bold mt-2">Change Password</h5>
      <p class="text-muted small">{{ request.user.get_full_name|default:request.user.username }}</p>
    </div>
    {% if messages %}{% for m in messages %}<div class="alert alert-{{ m.tags }}">{{ m }}</div>{% endfor %}{% endif %}
    <form method="post" novalidate>
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ field.label }}</label>
        <input type="password" name="{{ field.html_name }}" class="form-control {% if field.errors %}is-invalid{% endif %}">
        {% for error in field.errors %}<div class="invalid-feedback">{{ error }}</div>{% endfor %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary w-100">Save New Password</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
